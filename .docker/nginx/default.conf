server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Máximo tamaño de upload (tickets, PDFs)
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Livewire sirve su JS y el endpoint de acciones como RUTAS dinámicas
    # (/livewire/livewire.js, /livewire/update), NO como archivos. Deben ir a
    # PHP; si el bloque de estáticos de abajo las agarra, da 404 y muere toda
    # la interactividad (ningún botón funciona). ^~ tiene prioridad sobre la
    # regex de estáticos.
    location ^~ /livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Assets estáticos — cache largo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Todas las rutas van a Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(ht|git|env) {
        deny all;
    }
}
